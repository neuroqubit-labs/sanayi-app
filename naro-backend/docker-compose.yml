services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-naro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-naro_dev}
      POSTGRES_DB: ${POSTGRES_DB:-naro}
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-naro}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PUBLISHED_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - "${LOCALSTACK_PUBLISHED_PORT:-4566}:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "bash", "-lc", "awslocal s3 ls >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: ${ENV_FILE:-.env.example}
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      AWS_S3_ENDPOINT_URL: http://localstack:4566
    ports:
      - "${API_PUBLISHED_PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  worker:
    build: .
    env_file: ${ENV_FILE:-.env.example}
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      AWS_S3_ENDPOINT_URL: http://localstack:4566
    command: arq app.workers.settings.WorkerSettings
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  localstack-data:
