# Naro Render Blueprint
# ---------------------
# 3 servis: web (FastAPI/uvicorn), worker (ARQ cron + processor), redis.
# Postgres harici — Supabase (Frankfurt) yönetir; bağlantı POSTGRES_*
# env'leri ile elle girilir. Apply: Render > Blueprints > New Blueprint
# Instance > select repo.
#
# Notlar:
# - Supabase pooler "Session mode" (port 5432) kullan. Transaction mode
#   (port 6543) prepared statement cache'i kapatıyor; SQLAlchemy/asyncpg
#   varsayılanları + Alembic DDL bunu sevmiyor.
#     POSTGRES_HOST     = aws-0-eu-central-1.pooler.supabase.com
#     POSTGRES_PORT     = 5432
#     POSTGRES_USER     = postgres.<project_ref>
#     POSTGRES_PASSWORD = <supabase_db_password>
#     POSTGRES_DB       = postgres
# - PostGIS extension: Supabase Dashboard > Database > Extensions >
#   `postgis` toggle. Migration'lar varsayar.
# - sync: false olan env'ler Render dashboard'dan elle girilir (sırlar).
# - Sentry DSN opsiyonel; production'da gir.

services:
  - type: web
    name: naro-api
    runtime: docker
    rootDir: naro-backend
    plan: starter
    region: frankfurt
    branch: main
    healthCheckPath: /api/v1/ready
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips '*'
    preDeployCommand: alembic upgrade head
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PORT
        value: 8000
      - key: PAYMENT_PLATFORM_MODEL
        value: marketplace
      - key: PSP_PROVIDER
        value: iyzico
      - key: MAPS_PROVIDER
        value: google
      - key: SMS_PROVIDER
        value: twilio
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_DEFAULT
        value: 120/minute
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: SENTRY_RELEASE
        sync: false
      - key: IYZICO_API_KEY
        sync: false
      - key: IYZICO_SECRET_KEY
        sync: false
      - key: IYZICO_WEBHOOK_SECRET
        sync: false
      - key: IYZICO_BASE_URL
        value: https://api.iyzipay.com
      - key: IYZICO_CALLBACK_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PRIVATE_BUCKET
        sync: false
      - key: S3_PUBLIC_BUCKET
        sync: false
      - key: CLOUDFRONT_PUBLIC_BASE_URL
        sync: false
      - key: GOOGLE_MAPS_BACKEND_API_KEY
        sync: false
      # Supabase Postgres — pooler session mode (port 5432).
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        value: postgres
      - key: REDIS_HOST
        fromService:
          type: redis
          name: naro-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: naro-redis
          property: port

  - type: worker
    name: naro-worker
    runtime: docker
    rootDir: naro-backend
    plan: starter
    region: frankfurt
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerCommand: arq app.workers.settings.WorkerSettings
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PAYMENT_PLATFORM_MODEL
        value: marketplace
      - key: PSP_PROVIDER
        value: iyzico
      - key: MAPS_PROVIDER
        value: google
      - key: SMS_PROVIDER
        value: twilio
      - key: RATE_LIMIT_ENABLED
        value: "false"
      - key: JWT_SECRET
        fromService:
          type: web
          name: naro-api
          envVarKey: JWT_SECRET
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.0"
      - key: SENTRY_RELEASE
        sync: false
      - key: IYZICO_API_KEY
        sync: false
      - key: IYZICO_SECRET_KEY
        sync: false
      - key: IYZICO_WEBHOOK_SECRET
        sync: false
      - key: IYZICO_BASE_URL
        value: https://api.iyzipay.com
      - key: IYZICO_CALLBACK_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PRIVATE_BUCKET
        sync: false
      - key: S3_PUBLIC_BUCKET
        sync: false
      - key: GOOGLE_MAPS_BACKEND_API_KEY
        sync: false
      # Supabase Postgres — pooler session mode (port 5432).
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        value: postgres
      - key: REDIS_HOST
        fromService:
          type: redis
          name: naro-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: naro-redis
          property: port

  - type: redis
    name: naro-redis
    region: frankfurt
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction
