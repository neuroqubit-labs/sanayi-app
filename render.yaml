# Naro Render Blueprint
# ---------------------
# 4 servis: web (FastAPI/uvicorn), worker (ARQ cron + processor), postgres, redis.
# Apply: Render dashboard > Blueprints > New Blueprint Instance > select repo.
#
# Notlar:
# - PostGIS extension: ilk deploy sonrası psql ile `CREATE EXTENSION IF NOT EXISTS
#   postgis;` çalıştırılmalı (Render PostgreSQL postgis destekler ama default
#   enable etmez). Migration'lar varsayar.
# - sync: false olan env'ler dashboard'dan elle girilir (sırlar).
# - DATABASE_URL backend'in beklediği POSTGRES_* parçalanmış formatta değil; bu
#   yüzden POSTGRES_HOST/PORT/USER/PASSWORD/DB ayrı ayrı Postgres'ten çekiliyor.
# - Sentry DSN opsiyonel; production'da ekle.

services:
  - type: web
    name: naro-api
    runtime: docker
    rootDir: naro-backend
    plan: starter
    region: frankfurt
    branch: main
    healthCheckPath: /api/v1/ready
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips '*'
    preDeployCommand: alembic upgrade head
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PORT
        value: 8000
      - key: PAYMENT_PLATFORM_MODEL
        value: marketplace
      - key: PSP_PROVIDER
        value: iyzico
      - key: MAPS_PROVIDER
        value: google
      - key: SMS_PROVIDER
        value: twilio
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_DEFAULT
        value: 120/minute
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: SENTRY_RELEASE
        sync: false
      - key: IYZICO_API_KEY
        sync: false
      - key: IYZICO_SECRET_KEY
        sync: false
      - key: IYZICO_WEBHOOK_SECRET
        sync: false
      - key: IYZICO_BASE_URL
        value: https://api.iyzipay.com
      - key: IYZICO_CALLBACK_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PRIVATE_BUCKET
        sync: false
      - key: S3_PUBLIC_BUCKET
        sync: false
      - key: CLOUDFRONT_PUBLIC_BASE_URL
        sync: false
      - key: GOOGLE_MAPS_BACKEND_API_KEY
        sync: false
      - key: POSTGRES_HOST
        fromDatabase:
          name: naro-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: naro-postgres
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: naro-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: naro-postgres
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: naro-postgres
          property: database
      - key: REDIS_HOST
        fromService:
          type: redis
          name: naro-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: naro-redis
          property: port

  - type: worker
    name: naro-worker
    runtime: docker
    rootDir: naro-backend
    plan: starter
    region: frankfurt
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerCommand: arq app.workers.settings.WorkerSettings
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PAYMENT_PLATFORM_MODEL
        value: marketplace
      - key: PSP_PROVIDER
        value: iyzico
      - key: MAPS_PROVIDER
        value: google
      - key: SMS_PROVIDER
        value: twilio
      - key: RATE_LIMIT_ENABLED
        value: "false"
      - key: JWT_SECRET
        fromService:
          type: web
          name: naro-api
          envVarKey: JWT_SECRET
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.0"
      - key: SENTRY_RELEASE
        sync: false
      - key: IYZICO_API_KEY
        sync: false
      - key: IYZICO_SECRET_KEY
        sync: false
      - key: IYZICO_WEBHOOK_SECRET
        sync: false
      - key: IYZICO_BASE_URL
        value: https://api.iyzipay.com
      - key: IYZICO_CALLBACK_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PRIVATE_BUCKET
        sync: false
      - key: S3_PUBLIC_BUCKET
        sync: false
      - key: GOOGLE_MAPS_BACKEND_API_KEY
        sync: false
      - key: POSTGRES_HOST
        fromDatabase:
          name: naro-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: naro-postgres
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: naro-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: naro-postgres
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: naro-postgres
          property: database
      - key: REDIS_HOST
        fromService:
          type: redis
          name: naro-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: naro-redis
          property: port

  - type: redis
    name: naro-redis
    region: frankfurt
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: naro-postgres
    region: frankfurt
    plan: starter
    postgresMajorVersion: "16"
    ipAllowList: []
