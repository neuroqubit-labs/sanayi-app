name: Backend CI

on:
  pull_request:
    paths:
      - "naro-backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main]
    paths:
      - "naro-backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: naro-backend

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: naro
          POSTGRES_PASSWORD: naro
          POSTGRES_DB: naro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U naro"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENVIRONMENT: development
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: naro
      POSTGRES_PASSWORD: naro
      POSTGRES_DB: naro_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-test-secret-not-for-prod
      RATE_LIMIT_ENABLED: "false"
      PAYMENT_PLATFORM_MODEL: standard_sandbox
      PSP_PROVIDER: mock
      MAPS_PROVIDER: offline
      SMS_PROVIDER: console

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install --no-cache-dir uv

      - name: Install dependencies
        run: uv pip install --system --no-cache -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest tests/ -q
